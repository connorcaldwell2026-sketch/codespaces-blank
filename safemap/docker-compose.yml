version: '3.9'
services:
  api:
    build: ./server
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/safemap
      - WEB_PUSH_PUBLIC_KEY=your_public_key_here
      - WEB_PUSH_PRIVATE_KEY=your_private_key_here
      - TWILIO_ACCOUNT_SID=
      - TWILIO_AUTH_TOKEN=
      - TWILIO_FROM_NUMBER=
      - ANTHROPIC_API_KEY=
      - REGION_DEFAULT=us
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
  client:
    build: ./client
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:4000/api
  mongo:
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data: {}
